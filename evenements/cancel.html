<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement annulé</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#111;
      color:#fff;
      padding:40px 20px;
      text-align:center;
    }
    .box{
      max-width:720px;
      margin:auto;
      background:#1b1b1f;
      border:1px solid rgba(255,255,255,.1);
      border-radius:22px;
      padding:34px 26px;
      box-shadow:0 14px 40px rgba(0,0,0,.28);
    }
    h1{
      margin:0 0 14px;
      font-size:2rem;
    }
    p{
      color:#d0d0d5;
      line-height:1.6;
      margin:10px 0;
    }
    .warn{
      color:#ffb3b3;
      font-weight:700;
    }
    .btn{
      display:inline-block;
      margin-top:22px;
      padding:14px 18px;
      border-radius:14px;
      background:#d71920;
      color:#fff;
      text-decoration:none;
      font-weight:700;
    }
    .btn:hover{
      filter:brightness(1.05);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Paiement annulé</h1>
    <p class="warn">Ton inscription n’a pas encore été validée.</p>
    <p>
      Le paiement a été interrompu ou annulé avant confirmation.
    </p>
    <p>
      Tu peux revenir au formulaire et recommencer le paiement quand tu veux.
    </p>

    <a class="btn" href="/inscription.html">Retour à l’inscription</a>
  </div>
</body>
</html>
