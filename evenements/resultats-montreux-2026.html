<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Résultats — Montreux 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800;1,900&family=Barlow:wght@400;500;600;700&display=swap');
    :root{
      --bg:#0f0f10;--panel:#18181b;--panel2:#232326;--text:#f5f5f5;--muted:#b8b8bd;
      --red:#d71920;--red-soft:rgba(215,25,32,.10);--line:rgba(255,255,255,.10);
      --gold:#f5c518;--silver:#c0c0c0;--bronze:#cd7f32;--shadow:0 14px 40px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Barlow',Arial,sans-serif;background:radial-gradient(circle at top,rgba(215,25,32,.12),transparent 34%),linear-gradient(180deg,#111,#0d0d0f 55%,#111);color:var(--text);min-height:100vh;}
    .wrap{max-width:1180px;margin:auto;padding:24px 16px 60px;}

    /* HERO */
    .hero{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid var(--line);border-radius:28px;padding:36px 32px 28px;margin-bottom:24px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
    .hero::before{content:'';position:absolute;top:-40px;right:-40px;width:220px;height:220px;background:radial-gradient(circle,rgba(215,25,32,.18),transparent 70%);pointer-events:none;}
    .eyebrow{display:inline-block;background:var(--red);color:#fff;border-radius:999px;padding:7px 14px;font-weight:800;text-transform:uppercase;font-size:.78rem;letter-spacing:.08em;margin-bottom:14px;font-family:'Barlow Condensed',sans-serif;}
    .hero h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2.2rem,5vw,4.2rem);font-weight:900;line-height:.92;text-transform:uppercase;letter-spacing:.01em;margin-bottom:10px;}
    .hero h1 span{color:var(--red);}
    .hero p{color:var(--muted);line-height:1.5;max-width:680px;font-size:1rem;}

    /* STATS */
    .stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
    .stat-card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid var(--line);border-radius:18px;padding:18px 16px;text-align:center;}
    .stat-num{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:900;color:var(--red);line-height:1;margin-bottom:4px;}
    .stat-label{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600;}

    /* CAT TABS */
    .tabs-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
    .tab-btn{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:999px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:9px 18px;cursor:pointer;transition:.2s ease;white-space:nowrap;}
    .tab-btn:hover{border-color:rgba(215,25,32,.45);color:#fff;}
    .tab-btn.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 4px 16px rgba(215,25,32,.35);}

    /* MODE TOGGLE (Contest / Romand) */
    .mode-toggle{display:flex;gap:6px;margin-bottom:20px;}
    .mode-btn{flex:1;max-width:200px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:10px 16px;cursor:pointer;transition:.2s ease;text-align:center;}
    .mode-btn:hover{border-color:rgba(215,25,32,.4);color:#fff;}
    .mode-btn.active{background:rgba(215,25,32,.15);border-color:var(--red);color:#fff;}
    .mode-badge{display:inline-block;font-size:.68rem;background:var(--red);color:#fff;border-radius:999px;padding:2px 7px;margin-left:6px;vertical-align:middle;}
    .mode-badge.green{background:#29c66f;}

    /* CAT LABEL */
    .cat-label{display:inline-flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .cat-discipline{background:rgba(215,25,32,.15);border:1px solid rgba(215,25,32,.35);color:#ff6b6b;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;padding:5px 12px;border-radius:999px;}
    .cat-discipline.grey{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15);color:#ccc;}

    /* PODIUM */
    .podium-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px;}
    .podium-card{border-radius:22px;padding:24px 18px;text-align:center;position:relative;border:1px solid var(--line);transition:.2s ease;}
    .podium-card:hover{transform:translateY(-3px);}
    .podium-card.p1{background:linear-gradient(160deg,rgba(245,197,24,.12),rgba(245,197,24,.03));border-color:rgba(245,197,24,.3);order:2;}
    .podium-card.p2{background:linear-gradient(160deg,rgba(192,192,192,.10),rgba(192,192,192,.02));border-color:rgba(192,192,192,.2);order:1;margin-top:24px;}
    .podium-card.p3{background:linear-gradient(160deg,rgba(205,127,50,.10),rgba(205,127,50,.02));border-color:rgba(205,127,50,.2);order:3;margin-top:24px;}
    .podium-rank{font-family:'Barlow Condensed',sans-serif;font-size:3rem;font-weight:900;line-height:1;margin-bottom:8px;}
    .p1 .podium-rank{color:var(--gold);}.p2 .podium-rank{color:var(--silver);}.p3 .podium-rank{color:var(--bronze);}
    .podium-medal{font-size:1.6rem;margin-bottom:10px;display:block;}
    .podium-name{font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:800;text-transform:uppercase;line-height:1.1;margin-bottom:6px;}
    .podium-info{color:var(--muted);font-size:.8rem;margin-bottom:10px;line-height:1.4;}
    .podium-score{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;}
    .p1 .podium-score{color:var(--gold);}.p2 .podium-score{color:var(--silver);}.p3 .podium-score{color:var(--bronze);}
    .score-denom{font-size:.8rem;font-weight:500;color:var(--muted);}
    .podium-bt{font-size:.75rem;color:var(--muted);margin-top:4px;}
    .podium-bt strong{color:#ff6b6b;}

    /* RESULTS */
    .results-panel{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow);}
    .results-panel h2{font-family:'Barlow Condensed',sans-serif;font-size:1.35rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:16px;}
    .result-row{display:flex;align-items:center;gap:14px;padding:12px 14px;border-bottom:1px solid var(--line);transition:.15s ease;animation:fadeIn .4s ease both;}
    .result-row:last-child{border-bottom:none;}
    .result-row:hover{background:rgba(255,255,255,.03);border-radius:12px;}
    @keyframes fadeIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
    .rank-badge{width:36px;height:36px;border-radius:10px;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;flex:0 0 36px;box-shadow:0 3px 10px rgba(215,25,32,.3);}
    .rank-badge.r1{background:linear-gradient(135deg,#f5c518,#d4a017);color:#1a1000;}
    .rank-badge.r2{background:linear-gradient(135deg,#d0d0d0,#a0a0a0);color:#1a1a1a;}
    .rank-badge.r3{background:linear-gradient(135deg,#cd7f32,#a05c20);color:#1a0d00;}
    .result-info{flex:1;min-width:0;}
    .result-name{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:800;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .result-meta{color:var(--muted);font-size:.8rem;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .result-right{text-align:right;flex:0 0 auto;}
    .result-score{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;line-height:1;}
    .result-score .denom{font-size:.75rem;font-weight:500;color:var(--muted);}
    .result-bt{font-size:.72rem;color:#ff6b6b;margin-top:2px;font-weight:700;}
    .score-bar-wrap{width:70px;height:4px;background:rgba(255,255,255,.08);border-radius:999px;margin-top:5px;margin-left:auto;overflow:hidden;}
    .score-bar{height:100%;border-radius:999px;background:var(--red);}
    .score-bar.r1b{background:linear-gradient(90deg,#f5c518,#d4a017);}
    .score-bar.r2b{background:linear-gradient(90deg,#d0d0d0,#a0a0a0);}
    .score-bar.r3b{background:linear-gradient(90deg,#cd7f32,#a05c20);}

    /* SUBSECTION (Femme) */
    .sub-header{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-top:1px solid var(--line);padding-top:14px;margin:14px 0 10px;display:flex;align-items:center;gap:8px;}
    .sub-header::before{content:'';flex:0 0 3px;height:20px;background:var(--red);border-radius:2px;}

    /* VISIBILITY */
    .category-section{display:none;}
    .category-section.visible{display:block;}
    .view-panel{display:none;}
    .view-panel.visible{display:block;}


    /* SPONSORS */
    .sponsors-section{margin-top:40px;padding-top:32px;border-top:1px solid var(--line);}
    .sponsors-label{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);text-align:center;margin-bottom:20px;}
    .sponsors-grid{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;}
    .sponsor-card{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:20px;padding:20px 28px;display:flex;align-items:center;justify-content:center;transition:.2s ease;text-decoration:none;cursor:pointer;}
    .sponsor-card:hover{border-color:rgba(215,25,32,.5);background:rgba(255,255,255,.07);transform:translateY(-3px);box-shadow:0 8px 24px rgba(215,25,32,.18);}
    .sponsor-card img{display:block;object-fit:contain;}
    .sponsor-card.tsb img{height:68px;max-width:300px;}
    .sponsor-card.jf img{height:52px;max-width:150px;}
    .sponsor-card.isaac img{height:40px;max-width:190px;}
    .sponsor-card.jf{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.12);}
    .sponsor-card.isaac{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.12);}
    @media(max-width:600px){
      .sponsors-grid{gap:14px;}
      .sponsor-card.tsb img{height:50px;}
      .sponsor-card.jf img{height:38px;}
      .sponsor-card.isaac img{height:30px;}
    }

    @media(max-width:768px){
      .podium-wrap{grid-template-columns:1fr;}
      .podium-card.p1,.podium-card.p2,.podium-card.p3{order:unset;margin-top:0;}
      .stats-strip{grid-template-columns:repeat(2,1fr);}
      .score-bar-wrap{width:50px;}
    }
  </style>
</head>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentMode = 'contest';
let currentCat  = 'street-pro';

// ═══════════════════════════════════════════════════════════════
// BUILD TABS
// ═══════════════════════════════════════════════════════════════
function buildTabs() {
  const nav = document.getElementById('tabsNav');
  nav.innerHTML = CATS.map(c => `
    <button class="tab-btn ${c.id === currentCat ? 'active' : ''}" onclick="switchCat('${c.id}')">${c.label}</button>
  `).join('');
}

// ═══════════════════════════════════════════════════════════════
// RENDER ROW
// ═══════════════════════════════════════════════════════════════
function rowHtml(r, i, max, showBt) {
  const rank = i + 1;
  const bc = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
  const barCls = rank===1?'r1b':rank===2?'r2b':rank===3?'r3b':'';
  const pct = Math.round((r.score/max)*100);
  const delay = (i*0.05).toFixed(2);
  const btHtml = showBt && r.bt ? `<div class="result-bt">Best Trick: ${r.bt}/100</div>` : '';
  return `
    <div class="result-row" style="animation-delay:${delay}s">
      <div class="rank-badge ${bc}">${rank}</div>
      <div class="result-info">
        <div class="result-name">${r.name}</div>
        ${r.info ? `<div class="result-meta">${r.info}</div>` : ''}
      </div>
      <div class="result-right">
        <div class="result-score">${r.score}<span class="denom">/100</span></div>
        ${btHtml}
        <div class="score-bar-wrap"><div class="score-bar ${barCls}" style="width:${pct}%"></div></div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER PODIUM
// ═══════════════════════════════════════════════════════════════
function podiumHtml(top3, showBt) {
  const medals = ['🥇','🥈','🥉'];
  const cls = ['p1','p2','p3'];
  const order = [1,0,2]; // display: 2nd left, 1st center, 3rd right
  return `<div class="podium-wrap">${order.map(oi => {
    const r = top3[oi];
    if(!r) return '';
    const btLine = showBt && r.bt ? `<div class="podium-bt">Best Trick: <strong>${r.bt}/100</strong></div>` : '';
    return `<div class="podium-card ${cls[oi]}">
      <span class="podium-medal">${medals[oi]}</span>
      <div class="podium-rank">${oi+1}</div>
      <div class="podium-name">${r.name}</div>
      <div class="podium-info">${r.info || ''}</div>
      <div class="podium-score">${r.score}<span class="score-denom">/100</span></div>
      ${btLine}
    </div>`;
  }).join('')}</div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER SECTION
// ═══════════════════════════════════════════════════════════════
function renderSection(catId, mode) {
  const cat = CATS.find(c => c.id === catId);
  const data = mode === 'contest' ? CONTEST[catId] : ROMAND[catId];
  const showBt = mode === 'contest';
  const container = document.getElementById('sectionsContainer');

  // No data
  if (!data) {
    container.innerHTML = `
      <div class="cat-label">
        <span class="cat-discipline">${cat.disc}</span>
        <span class="cat-discipline grey">${cat.age}</span>
      </div>
      <div class="results-panel" style="text-align:center;padding:40px;color:var(--muted);">
        Pas de classement Romand disponible pour cette catégorie.
      </div>`;
    return;
  }

  // Amateur Park (contest has sub-sections: amateur + femme)
  if (catId === 'amateur-park' && mode === 'contest' && data.amateur) {
    const amateur = data.amateur;
    const femme   = data.femme || [];
    const max = amateur[0].score;
    container.innerHTML = `
      <div class="cat-label">
        <span class="cat-discipline">${cat.disc}</span>
        <span class="cat-discipline grey">${cat.age}</span>
        <span class="cat-discipline grey">+ Femme</span>
      </div>
      ${podiumHtml(amateur.slice(0,3), showBt)}
      <div class="results-panel">
        <h2>Classement Contest — ${cat.label}</h2>
        <div class="sub-header">Amateur</div>
        ${amateur.map((r,i) => rowHtml(r,i,max,showBt)).join('')}
        <div class="sub-header">Femme</div>
        ${femme.map((r,i) => rowHtml(r,i,femme[0].score,showBt)).join('')}
      </div>`;
    return;
  }

  // Normal array
  const list = Array.isArray(data) ? data : data.amateur || [];
  const max = list[0].score;
  const title = mode === 'contest' ? `Classement Contest — ${cat.label}` : `Classement Romand — ${cat.label}`;

  container.innerHTML = `
    <div class="cat-label">
      <span class="cat-discipline">${cat.disc}</span>
      <span class="cat-discipline grey">${cat.age}</span>
    </div>
    ${podiumHtml(list.slice(0,3), showBt)}
    <div class="results-panel">
      <h2>${title}</h2>
      ${list.map((r,i) => rowHtml(r,i,max,showBt)).join('')}
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeContest').classList.toggle('active', mode==='contest');
  document.getElementById('modeRomand').classList.toggle('active', mode==='romand');
  renderSection(currentCat, currentMode);
}

function switchCat(catId) {
  currentCat = catId;
  buildTabs();
  renderSection(currentCat, currentMode);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
buildTabs();
renderSection(currentCat, currentMode);
</script>
