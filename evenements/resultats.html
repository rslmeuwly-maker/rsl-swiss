<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Résultats — Montreux 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--red:#d71920;--panel2:#232326;--text:#f5f5f5;--muted:#b8b8bd;--line:rgba(255,255,255,.10);--green:#29c66f;--gold:#f6c90e;--j1:#3b82f6;--j2:#a855f7;--j3:#f97316}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,rgba(215,25,32,.12),transparent 34%),linear-gradient(180deg,#111,#0d0d0f 55%,#111);color:var(--text);min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.4);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;gap:12px;flex-wrap:wrap}
    .topbar h1{font-size:1rem;text-transform:uppercase;letter-spacing:.04em}
    .seg{display:flex;background:var(--panel2);border-radius:12px;overflow:hidden;border:1px solid var(--line)}
    .seg button{border:none;padding:8px 18px;font:inherit;font-size:.85rem;font-weight:700;cursor:pointer;color:var(--muted);background:transparent;transition:.15s}
    .seg button.active{background:var(--red);color:#fff}
    .btn-sm{border:none;border-radius:10px;padding:7px 14px;background:rgba(255,255,255,.08);color:var(--muted);font-size:.82rem;font-weight:700;cursor:pointer;transition:.15s}
    .btn-sm:hover{background:rgba(255,255,255,.13);color:#fff}
    .wrap{padding:18px 22px}
    .cat-block{margin-bottom:22px;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01))}
    .cat-header{display:flex;align-items:center;gap:10px;padding:12px 18px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--line)}
    .cat-label{background:var(--red);color:#fff;border-radius:999px;padding:4px 14px;font-weight:900;font-size:.85rem;text-transform:uppercase}
    .cat-sex{background:rgba(255,255,255,.07);color:var(--muted);border-radius:999px;padding:4px 12px;font-weight:700;font-size:.82rem}
    .cat-count{color:var(--muted);font-size:.82rem;margin-left:auto}
    table{width:100%;border-collapse:collapse}
    thead th{padding:9px 10px;text-align:center;text-transform:uppercase;font-size:.65rem;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line);white-space:nowrap}
    thead th.left{text-align:left}
    tbody tr{border-bottom:1px solid rgba(255,255,255,.04)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:rgba(255,255,255,.02)}
    td{padding:9px 10px;vertical-align:middle;text-align:center}
    td.left{text-align:left}
    .rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.85rem;margin:auto}
    .rank-1{background:var(--gold);color:#000}.rank-2{background:#c0c0c0;color:#000}.rank-3{background:#cd7f32;color:#fff}.rank-n{background:rgba(255,255,255,.07);color:var(--muted)}
    .rider-name{font-weight:700;font-size:.9rem}
    .rider-sub{color:var(--muted);font-size:.75rem;margin-top:1px}
    .j1{color:var(--j1)}.j2{color:var(--j2)}.j3{color:var(--j3)}
    .jbadge{display:inline-block;border-radius:6px;padding:2px 7px;font-size:.72rem;font-weight:700}
    .jbadge.j1{background:rgba(59,130,246,.15);color:var(--j1)}
    .jbadge.j2{background:rgba(168,85,247,.15);color:var(--j2)}
    .jbadge.j3{background:rgba(249,115,22,.15);color:var(--j3)}
    .score-cell{font-size:.88rem;font-weight:700;min-width:36px}
    .score-cell.dim{color:var(--muted);font-weight:400;font-size:.8rem}
    .final-score{font-size:1.3rem;font-weight:900}
    .final-score.has{color:var(--gold)}
    .final-score.dim{color:var(--muted);font-size:.9rem}
    .pending{color:var(--muted);font-size:.78rem;font-style:italic}
    .empty-block{text-align:center;padding:36px;color:var(--muted)}
    .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center;font-size:.8rem;color:var(--muted)}
    .legend span{display:flex;align-items:center;gap:5px}
    @media(max-width:700px){.wrap{padding:10px}}
    @media print{.topbar-controls{display:none}body{background:#fff;color:#000}.cat-block{border:1px solid #ccc}}
  </style>
</head>
<body>
<div class="topbar">
  <h1>🏆 Résultats · Montreux 2026</h1>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <div class="seg" id="discSeg">
      <button class="active" onclick="setDisc('Park')">Park</button>
      <button onclick="setDisc('Street')">Street</button>
    </div>
    <button class="btn-sm" onclick="loadAll()">↻ Actualiser</button>
    <button class="btn-sm" onclick="window.print()">🖨 Imprimer</button>
  </div>
</div>

<div class="wrap" id="mainWrap">
  <div class="empty-block">Chargement…</div>
</div>

<script>
  const SUPABASE_URL  = "https://jynxifufaauoxwzjapzq.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5bnhpZnVmYWF1b3h3emphcHpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEzODI2NzcsImV4cCI6MjA3Njk1ODY3N30.vFPGhGakPIM3Xg5rn8_BrAXl6oJMJOssO780C9nXmr4";
  const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const CATEGORIES = ["U13","U15","Amateur","Pro"];
  const SEXES      = ["Homme","Femme"];

  let currentDisc = "Park";
  let allRiders   = [];
  let allScores   = []; // raw rows from DB

  function setDisc(d) {
    currentDisc = d;
    document.querySelectorAll("#discSeg button").forEach(b => b.classList.toggle("active", b.textContent===d));
    renderAll();
  }

  async function loadAll() {
    document.getElementById("mainWrap").innerHTML = '<div class="empty-block">Chargement…</div>';
    const { data: riders, error } = await _supa.from("inscriptions").select("*").eq("paid",true).order("last_name");
    if (error) { document.getElementById("mainWrap").innerHTML='<div class="empty-block">Erreur : '+error.message+'</div>'; return; }
    allRiders = riders || [];
    const { data: sc } = await _supa.from("scores").select("*");
    allScores = sc || [];
    renderAll();
  }

  function getJugeScore(riderId, disc, jugeNum) {
    return allScores.find(s => s.inscription_id===riderId && s.discipline===disc && s.juge===jugeNum) || null;
  }

  function calcJugeTotal(sc) {
    if (!sc) return null;
    const vals = [sc.style, sc.technique, sc.originalite].filter(v => v!=null);
    const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/3 : 0;
    const best = Math.max(sc.t1??0, sc.t2??0, sc.t3??0);
    return avg + best;
  }

  function getFinalScore(riderId, disc) {
    const totals = [1,2,3].map(j => calcJugeTotal(getJugeScore(riderId, disc, j))).filter(v=>v!==null);
    if (!totals.length) return null;
    return totals.reduce((a,b)=>a+b,0) / totals.length;
  }

  function renderAll() {
    const wrap = document.getElementById("mainWrap");
    wrap.innerHTML = "";

    const riders = allRiders.filter(r => matchDisc(r));
    if (!riders.length) { wrap.innerHTML='<div class="empty-block">Aucun rider payé pour '+currentDisc+'.</div>'; return; }

    // Legend
    const leg = document.createElement("div");
    leg.className = "legend";
    leg.innerHTML = `
      <span><span class="jbadge j1">Juge 1</span></span>
      <span><span class="jbadge j2">Juge 2</span></span>
      <span><span class="jbadge j3">Juge 3</span></span>
      <span style="margin-left:8px">Score = moy. critères (Style+Technique+Originalité) + meilleur trick</span>`;
    wrap.appendChild(leg);

    let found = false;
    CATEGORIES.forEach(cat => {
      SEXES.forEach(sex => {
        const group = riders.filter(r => r.category===cat && normSex(r.sex)===sex);
        if (!group.length) return;
        found = true;
        const sorted = [...group].sort((a,b) => {
          const fa = getFinalScore(a.id, currentDisc) ?? -1;
          const fb = getFinalScore(b.id, currentDisc) ?? -1;
          return fb - fa;
        });

        const block = document.createElement("div");
        block.className = "cat-block";
        block.innerHTML = `
          <div class="cat-header">
            <span class="cat-label">${cat}</span>
            <span class="cat-sex">${sex}</span>
            <span class="cat-count">${group.length} rider${group.length>1?"s":""}</span>
          </div>
          <table>
            <thead><tr>
              <th style="width:36px" class="left">Pos.</th>
              <th class="left">Rider</th>
              <th colspan="2"><span class="jbadge j1">Juge 1</span></th>
              <th colspan="2"><span class="jbadge j2">Juge 2</span></th>
              <th colspan="2"><span class="jbadge j3">Juge 3</span></th>
              <th>Score final</th>
            </tr>
            <tr>
              <th></th><th></th>
              <th>Critères</th><th>Best</th>
              <th>Critères</th><th>Best</th>
              <th>Critères</th><th>Best</th>
              <th></th>
            </tr></thead>
            <tbody id="tbody-${cat}-${sex}"></tbody>
          </table>`;
        wrap.appendChild(block);

        const tbody = document.getElementById("tbody-"+cat+"-"+sex);
        sorted.forEach((r, i) => {
          const rank = i+1;
          const rankClass = rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"rank-n";
          const final = getFinalScore(r.id, currentDisc);

          function jugeCell(jugeNum, cls) {
            const sc = getJugeScore(r.id, currentDisc, jugeNum);
            if (!sc) return `<td class="pending">—</td><td class="pending">—</td>`;
            const vals=[sc.style,sc.technique,sc.originalite].filter(v=>v!=null);
            const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/3).toFixed(1) : "—";
            const best = Math.max(sc.t1??0,sc.t2??0,sc.t3??0)||"—";
            return `<td class="score-cell ${cls}">${avg}</td><td class="score-cell ${cls}">${best}</td>`;
          }

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="left"><div class="rank ${rankClass}">${rank}</div></td>
            <td class="left"><div class="rider-name">${esc(r.first_name)} ${esc(r.last_name)}</div><div class="rider-sub">${esc(r.city||"")}${r.club?" · "+esc(r.club):""}</div></td>
            ${jugeCell(1,"j1")}
            ${jugeCell(2,"j2")}
            ${jugeCell(3,"j3")}
            <td><span class="final-score ${final!==null?"has":"dim"}">${final!==null?final.toFixed(2):"en attente"}</span></td>`;
          tbody.appendChild(tr);
        });
      });
    });

    if (!found) wrap.innerHTML='<div class="empty-block">Aucun rider trouvé.</div>';
  }

  function matchDisc(r) {
    const d=(r.discipline||"").toLowerCase(), p=(r.pack_type||"").toLowerCase();
    return p.includes("pack")||!r.discipline||d===currentDisc.toLowerCase();
  }
  function normSex(s) {
    if(!s) return "Homme";
    const v=s.toLowerCase().trim();
    return ["f","femme","female","féminin","feminin","girl"].includes(v)?"Femme":"Homme";
  }
  function esc(str) { return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  loadAll();
</script>
</body>
</html>
